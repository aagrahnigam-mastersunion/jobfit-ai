<body class="min-h-screen flex items-center justify-center p-gutter-desktop">
<!-- Auth Shell Suppression: No TopNavBar or SideNavBar for Sign-In flow as per instructions -->
<main class="w-full max-w-[400px] flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Centered Card Container -->
<div class="w-full bg-surface-container-lowest p-2xl rounded-xl shadow-[0px_4px_12px_rgba(24,60,230,0.08),0px_2px_4px_rgba(24,60,230,0.06)] border border-outline-variant/20">
<!-- Branding Area -->
<div class="flex flex-col items-center mb-3xl">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-lg shadow-md">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-weight="fill">work</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface text-center font-bold tracking-tight">Sign in to JobFit AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">Unlock your career potential with AI guidance</p>
</div>
<!-- Google Auth -->
<button class="w-full h-[52px] bg-white border border-outline-variant hover:bg-surface-container-low transition-all duration-200 rounded-full flex items-center justify-center gap-md px-lg group active:scale-[0.98]">
<div class="w-5 h-5 flex items-center justify-center">
<img alt="Google Logo" class="w-full h-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDycVdEm24599r4MyG_UjgUHwxHIoHCKYlGRuE5JXGXh2n00KAVpOzmauBOSX572wZcmHZvGfuwkTdhCMyqmyxcnQsBA5JQSFttZdE33PEcIWLPDLd175IxWexrZva8wMyrAe_sD7if6OoDtDgcD_f76ToODNuM8WDIYKXrsaGfp6ZoesI-L7gPvetglCw28T3sUoV1qR6fomoE7_javq4Q766--Bk-9V9bWoL3IPS9BZy2GFVgWzw5sT5f8zon-VUfH6SlK3iRTqWR"/>
</div>
<span class="font-label-lg text-label-lg text-on-surface">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center my-2xl">
<div class="flex-grow h-px bg-outline-variant/50"></div>
<span class="mx-lg font-label-md text-label-md text-outline uppercase tracking-widest">or</span>
<div class="flex-grow h-px bg-outline-variant/50"></div>
</div>
<!-- Passwordless Flow -->
<form action="#" class="space-y-xl" onsubmit="return false;">
<div class="relative">
<label class="absolute -top-2 left-3 px-1 bg-surface-container-lowest font-label-sm text-label-sm text-primary transition-all" for="email">Email address</label>
<input class="w-full h-[56px] px-lg rounded-lg border-2 border-primary bg-transparent font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-0 transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<button class="w-full h-[48px] bg-primary text-on-primary hover:bg-on-primary-fixed-variant transition-all duration-200 rounded-full font-label-lg text-label-lg shadow-sm hover:shadow-md active:scale-95 flex items-center justify-center gap-sm">
<span>Send Magic Link</span>
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-3xl pt-xl border-t border-outline-variant/30 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    By continuing, you agree to JobFit AI's 
                    <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> 
                    and 
                    <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
<!-- Secondary Links -->
<div class="mt-2xl flex flex-col items-center gap-md">
<a class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary flex items-center gap-xs group transition-colors" href="#">
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-[-2px] transition-transform">arrow_back</span>
<span>Back to Home</span>
</a>
<p class="font-label-md text-label-md text-outline">
                Need help? <a class="text-secondary font-bold hover:underline" href="#">Contact Support</a>
</p>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden opacity-40 pointer-events-none">
<div class="absolute top-[10%] left-[5%] w-[400px] h-[400px] bg-primary-fixed rounded-full blur-3xl mix-blend-multiply animate-pulse"></div>
<div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] bg-secondary-fixed rounded-full blur-3xl mix-blend-multiply"></div>
</div>
<script>
        // Micro-interactions for form labels
        const emailInput = document.getElementById('email');
        const emailLabel = document.querySelector('label[for="email"]');

        emailInput.addEventListener('focus', () => {
            emailLabel.classList.remove('text-outline');
            emailLabel.classList.add('text-primary');
        });

        emailInput.addEventListener('blur', (e) => {
            if (!e.target.value) {
                emailLabel.classList.add('text-outline');
                emailLabel.classList.remove('text-primary');
            }
        });
    </script>
</body></html>
