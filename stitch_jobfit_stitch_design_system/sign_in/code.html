<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #ffffff; /* Pure Surface */
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-gutter-mobile md:p-gutter-desktop">
<main class="w-full max-w-[440px] flex flex-col items-center animate-fade-in">
<!-- Header Section -->
<header class="flex flex-col items-center text-center mb-3xl">
<div class="mb-lg bg-primary-container/10 p-md rounded-2xl">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm">
                Sign in to JobFit AI
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Analyse your job fit and track your applications
            </p>
</header>
<!-- Auth Actions Container -->
<section class="w-full bg-surface-container-lowest p-xl md:p-2xl rounded-2xl shadow-sm border border-outline-variant/30">
<!-- Google Sign In -->
<button class="w-full h-12 flex items-center justify-center gap-sm border border-outline text-on-surface font-label-lg text-label-lg rounded-full hover:bg-surface-variant/20 transition-all active:scale-95">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 1.2-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Divider -->
<div class="relative flex items-center my-xl">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-body-sm text-body-sm text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Email Form -->
<form class="flex flex-col gap-xl" onsubmit="event.preventDefault();">
<div class="relative">
<input class="peer w-full h-14 px-lg pt-base border border-outline rounded-xl font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none bg-transparent transition-all" id="email" placeholder=" " type="email"/>
<label class="absolute left-lg top-4 font-body-lg text-body-lg text-on-surface-variant transition-all pointer-events-none peer-focus:-top-2 peer-focus:left-sm peer-focus:text-label-md peer-focus:bg-surface-container-lowest peer-focus:px-xs peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:left-sm peer-[:not(:placeholder-shown)]:text-label-md peer-[:not(:placeholder-shown)]:bg-surface-container-lowest peer-[:not(:placeholder-shown)]:px-xs peer-focus:text-primary" for="email">
                        Email address
                    </label>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-full hover:shadow-lg hover:bg-primary/90 transition-all active:scale-95 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>
                    Send Magic Link
                </button>
</form>
</section>
<!-- Footer Section -->
<footer class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px]">
                By signing in you agree to our <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a>
</p>
</footer>
</main>
<!-- Background Decoration for Visual Interest -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden opacity-40 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-fixed-dim/30 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary-fixed-dim/20 rounded-full blur-[80px]"></div>
</div>
<script>
        // Micro-interaction for form focus states
        const emailInput = document.getElementById('email');
        emailInput.addEventListener('focus', () => {
            emailInput.parentElement.classList.add('focused');
        });
        emailInput.addEventListener('blur', () => {
            emailInput.parentElement.classList.remove('focused');
        });

        // Simple fade-in animation
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            main.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
            
            requestAnimationFrame(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            });
        });
    </script>
