<style>
        body {
            background-color: #fcf8fb;
            color: #1c1b1d;
            font-family: 'Roboto Flex', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar suppression for JD textarea */
        textarea::-webkit-scrollbar {
            width: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #c5c5d9;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen pb-24">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-40 bg-surface dark:bg-background">
<div class="flex justify-between items-center px-lg h-16 w-full transition-colors duration-200">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg font-bold text-primary dark:text-primary-fixed">Analyse a Job</h1>
</div>
<button class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">auto_awesome</span>
</button>
</div>
</header>
<main class="flex-1 px-margin-mobile pt-sm max-w-full overflow-x-hidden">
<!-- Header Section -->
<section class="mb-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Analyse a Job</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Paste a LinkedIn job description to get your personalised match analysis</p>
</section>
<!-- Form Section -->
<form class="space-y-xl" onsubmit="return false;">
<!-- JD Input Area -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="jd-input">Job Description</label>
<textarea class="w-full min-h-[250px] p-lg rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-lg text-body-lg transition-all" id="jd-input" placeholder="Paste the job description here..."></textarea>
</div>
<!-- Optional Info Fields -->
<div class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="job-title">Job Title (optional)</label>
<input class="w-full h-14 px-lg rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-lg text-body-lg" id="job-title" placeholder="e.g. Senior Product Designer" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="company">Company (optional)</label>
<input class="w-full h-14 px-lg rounded-xl border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-lg text-body-lg" id="company" placeholder="e.g. Acme Corp" type="text"/>
</div>
</div>
<!-- Preferences Card -->
<section class="p-xl bg-elevated-surface-1 rounded-xl shadow-sm border-l-4 border-primary/20">
<div class="flex justify-between items-center mb-lg">
<h3 class="font-title-md text-title-md text-on-surface">Your Preferences</h3>
<span class="material-symbols-outlined text-on-surface-variant scale-90">tune</span>
</div>
<div class="flex flex-wrap gap-sm mb-xl">
<div class="h-8 px-lg bg-primary-container text-on-primary-container rounded-full flex items-center font-label-md text-label-md">
                        Product
                    </div>
<div class="h-8 px-lg bg-primary-container text-on-primary-container rounded-full flex items-center font-label-md text-label-md">
                        Mid-level
                    </div>
<div class="h-8 px-lg bg-primary-container text-on-primary-container rounded-full flex items-center font-label-md text-label-md">
                        Remote
                    </div>
</div>
<button class="w-full text-right font-label-lg text-label-lg text-primary hover:underline transition-all flex items-center justify-end gap-1">
                    Edit Preferences 
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</section>
<!-- Primary Action Button -->
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-title-md text-title-md flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform duration-150">
                Analyse My Fit
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Atmospheric Micro-interaction (Visual Only) -->
<div class="mt-4xl opacity-10 flex flex-col items-center justify-center text-center px-xl">
<span class="material-symbols-outlined text-4xl mb-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<p class="font-label-sm text-label-sm uppercase tracking-widest">AI Matching Engine Active</p>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-md py-sm bg-surface-container dark:bg-surface-container rounded-t-xl shadow-sm">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-variant transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary-container text-on-secondary-container dark:text-on-secondary-container rounded-full px-5 py-1 transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-label-md text-label-md">Analyse</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-variant transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label-md text-label-md">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-variant transition-transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</a>
</nav>
<script>
        // Simple micro-interaction for the JD input focus state
        const textarea = document.getElementById('jd-input');
        textarea.addEventListener('focus', () => {
            textarea.closest('div').classList.add('scale-[1.01]');
        });
        textarea.addEventListener('blur', () => {
            textarea.closest('div').classList.remove('scale-[1.01]');
        });

        // Add ripple-like effect on button click
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function(e) {
                this.style.opacity = '0.8';
            });
            button.addEventListener('mouseup', function(e) {
                this.style.opacity = '1';
            });
            button.addEventListener('mouseleave', function(e) {
                this.style.opacity = '1';
            });
        });
    </script>
</body></html>
